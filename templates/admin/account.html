{% extends "admin/_layout.html" %}
{% set active = "account" %}
{% block title %}Account — Admin{% endblock %}
{% block admin_content %}

<div class="admin-header"><h1>Account</h1></div>

<div class="admin-card" style="max-width:480px;">
  <h2 style="font-size:1.05rem; margin-bottom:6px;">Change password</h2>
  <p class="form-hint" style="margin-bottom:20px;">Logged in as <strong>{{ current_user.username }}</strong></p>
  <form method="POST">
    <div class="form-group">
      <label for="current_password">Current password</label>
      <input type="password" id="current_password" name="current_password" required>
    </div>
    <div class="form-group">
      <label for="new_password">New password</label>
      <input type="password" id="new_password" name="new_password" minlength="8" required>
    </div>
    <div class="form-group">
      <label for="confirm_password">Confirm new password</label>
      <input type="password" id="confirm_password" name="confirm_password" minlength="8" required>
    </div>
    <button type="submit" class="btn btn-primary">Update password</button>
  </form>
</div>

{% endblock %}
